name: Sync dashboard data sources

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GIS and website sync when due
        env:
          DASHBOARD_SYNC_URL: ${{ secrets.DASHBOARD_SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$DASHBOARD_SYNC_URL"
          test -n "$CRON_SECRET"
          curl --fail-with-body --retry 2 --max-time 180 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DASHBOARD_SYNC_URL/api/cron/sync"
